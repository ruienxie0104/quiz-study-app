<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考試複習 Quiz App</title>
  <meta name="description" content="互動式考試複習應用，支援選擇題與簡答題，即時回饋與錯題回顧">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== 開始畫面 ===== -->
  <div id="screen-start" class="screen active">
    <div class="start-container">
      <div class="start-logo">
        <div class="logo-icon">📝</div>
        <h1 class="start-title">考試複習 Quiz</h1>
        <p class="start-subtitle">網路通訊概論｜期末複習</p>
      </div>
      <div class="start-stats">
        <div class="stat-card">
          <span class="stat-number">12</span>
          <span class="stat-label">選擇題</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">3</span>
          <span class="stat-label">簡答題</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">15</span>
          <span class="stat-label">總題數</span>
        </div>
      </div>
      <button id="btn-start" class="btn-primary btn-glow" onclick="startQuiz()">
        <span>開始答題</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <p class="start-hint">💡 答錯會顯示正確答案，結束後可回顧錯題</p>
    </div>
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <!-- ===== 作答畫面 ===== -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-info">
        <span id="q-counter" class="q-counter">1 / 15</span>
        <span id="q-type-badge" class="q-type-badge">選擇題</span>
      </div>
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
      </div>
      <div class="score-display">
        <span id="score-display">✅ 0</span>
      </div>
    </div>

    <div class="quiz-body">
      <div id="question-card" class="question-card">
        <div id="question-number" class="question-number">Q1</div>
        <p id="question-text" class="question-text"></p>
        <p id="question-concept" class="question-concept"></p>
      </div>

      <!-- 選擇題選項 -->
      <div id="options-container" class="options-container"></div>

      <!-- 簡答題輸入區 -->
      <div id="short-answer-container" class="short-answer-container" style="display:none;">
        <textarea id="short-answer-input" class="short-answer-input" placeholder="請輸入你的答案..." rows="6"></textarea>
        <button id="btn-submit-short" class="btn-submit-answer" onclick="submitShortAnswer()">
          <span>提交答案</span>
        </button>
      </div>

      <!-- 答題結果提示 -->
      <div id="feedback-overlay" class="feedback-overlay" style="display:none;">
        <div id="feedback-card" class="feedback-card">
          <div id="feedback-icon" class="feedback-icon"></div>
          <h2 id="feedback-title" class="feedback-title"></h2>
          <div id="feedback-detail" class="feedback-detail"></div>
          <button id="btn-next" class="btn-primary btn-next" onclick="nextQuestion()">
            <span id="btn-next-text">下一題</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 結果畫面 ===== -->
  <div id="screen-result" class="screen">
    <div class="result-container">
      <div class="result-header">
        <div id="result-emoji" class="result-emoji">🎉</div>
        <h1 id="result-title" class="result-title">做得好！</h1>
        <div class="result-score-ring">
          <svg viewBox="0 0 120 120" class="score-ring-svg">
            <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
            <circle id="score-ring-circle" cx="60" cy="60" r="52" fill="none" stroke="url(#scoreGradient)" stroke-width="8" stroke-linecap="round" stroke-dasharray="326.73" stroke-dashoffset="326.73" transform="rotate(-90 60 60)"/>
            <defs>
              <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#6C63FF"/>
                <stop offset="100%" stop-color="#48E5C2"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="score-ring-text">
            <span id="result-score" class="result-score-num">0</span>
            <span class="result-score-label">正確率</span>
          </div>
        </div>
        <p id="result-summary" class="result-summary"></p>
      </div>

      <div id="result-wrong-section" class="result-wrong-section">
        <h2 class="wrong-title">❌ 答錯的題目</h2>
        <div id="wrong-list" class="wrong-list"></div>
      </div>

      <div class="result-actions">
        <button class="btn-primary btn-glow" onclick="restartAll()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          <span>全部重新作答</span>
        </button>
        <button id="btn-retry-wrong" class="btn-secondary" onclick="retryWrong()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
          <span>僅錯題重做</span>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
